<svg width="1200" height="320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <style>
    .title { font: bold 52px sans-serif; fill: #ffffff; }
    .subtitle { font: 22px sans-serif; fill: #c9d1d9; }
    .features { font: 18px sans-serif; fill: #8b949e; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0d1117"></rect>

  <!-- TikTok accent bars -->
  <rect x="0" y="0" width="100%" height="6" fill="#ff0050"></rect>
  <rect x="0" y="6" width="100%" height="3" fill="#00f2ea"></rect>

  <!-- Neon circles -->
  <circle cx="150" cy="80" r="40" fill="#ff0050" opacity="0.15"></circle>
  <circle cx="1050" cy="240" r="50" fill="#00f2ea" opacity="0.15"></circle>

  <!-- Title with glow -->
  <text x="50%" y="130" text-anchor="middle" class="title" filter="url(#glow)">
    TikTok Archive Builder
  </text>

  <!-- Subtitle -->
  <text x="50%" y="180" text-anchor="middle" class="subtitle">
    Offline HTML Archive Viewer
  </text>

  <!-- Feature line -->
  <text x="50%" y="220" text-anchor="middle" class="features">
    🎥 Videos • 💬 Comments • 🖼 Images • 📸 Slideshows
  </text>
</svg>
